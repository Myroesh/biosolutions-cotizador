<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Biosolutions Cotizador{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}?v=7" />
  <style>
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      padding:14px 22px;
      background:#fff;
      border-bottom:1px solid #dbe3ea;
      position:sticky;
      top:0;
      z-index:20;
    }
    .topbar-left{
      display:flex;
      align-items:center;
      gap:14px;
    }
    .topbar-logo{
      height:42px;
      width:auto;
      display:block;
    }
    .topbar-title{
      font-size:18px;
      font-weight:800;
      color:#0a4570;
    }
    .nav-links{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }
    .nav-links a{
      text-decoration:none;
      padding:9px 12px;
      border-radius:10px;
      background:#eef3f7;
      color:#0a4570;
      font-weight:700;
      font-size:13px;
    }
    .nav-links a.active{
      background:#0b8fb0;
      color:#fff;
    }
    .page-shell{
      padding:20px;
    }
    .dashboard-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:16px;
    }
    .dash-card{
      background:#fff;
      border:1px solid #dbe3ea;
      border-radius:18px;
      padding:20px;
      box-shadow:0 6px 18px rgba(0,0,0,.04);
    }
    .dash-card h3{
      margin:0 0 10px;
      color:#0a4570;
    }
    .dash-card p{
      margin:0 0 14px;
      color:#64748b;
      line-height:1.6;
      font-size:14px;
    }
    .dash-card a{
      display:inline-block;
      text-decoration:none;
      background:#0b8fb0;
      color:#fff;
      padding:10px 14px;
      border-radius:10px;
      font-weight:700;
      font-size:13px;
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <img src="{{ url_for('static', filename='logo_biosolutions.png') }}" alt="BioSolutions" class="topbar-logo">
      <div class="topbar-title">Biosolutions Cotizador</div>
    </div>

    <nav class="nav-links">
      <a href="{{ url_for('dashboard') }}" class="{% if active_page == 'inicio' %}active{% endif %}">Inicio</a>
      <a href="{{ url_for('cotizador') }}" class="{% if active_page == 'cotizador' %}active{% endif %}">Cotizador</a>
      <a href="{{ url_for('equipos_page') }}" class="{% if active_page == 'equipos' %}active{% endif %}">Equipos maestro</a>
      <a href="{{ url_for('plantillas_page') }}" class="{% if active_page == 'plantillas' %}active{% endif %}">Plantillas</a>
      <a href="{{ url_for('cotizaciones_page') }}" class="{% if active_page == 'cotizaciones' %}active{% endif %}">Cotizaciones</a>
    </nav>
  </header>

  <main class="page-shell">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
